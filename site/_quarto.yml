project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - partidos.qmd

website:
  title: "Planómetro 2026"
  navbar:
    title: false
    collapse-below: lg
    right:
      - text: Propuestas
        menu:
          - text: Cantidad y claridad
            href: "index.html#panorama"
          - text: Agenda
            href: "index.html#agenda"
      - text: Coincidencias
        menu:
          - text: Similitud
            href: "index.html#similitud"
          - text: Cobertura
            href: "index.html#cobertura"
      - text: Factibilidad
        menu:
          - text: Concreción
            href: "index.html#concrecion"
          - text: Viabilidad fiscal
            href: "index.html#viabilidad"
          - text: Contraste
            href: "index.html#benchmark"
          - text: Seguimiento
            href: "index.html#kpis"
          - text: Implementabilidad
            href: "index.html#bart"
      - text: Métodos
        href: "index.html#metodos"
      - text: Partidos
        href: "partidos.html"
      - text: Contacto
        href: "index.html#contacto"

format:
  html:
    theme: default
    toc: false
    smooth-scroll: true
    css: styles.css
    include-in-header: head.html
